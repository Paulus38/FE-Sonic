name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: fe-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Install · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Override via repo Variable VITE_API_URL if set
          VITE_API_URL: ${{ vars.VITE_API_URL != '' && vars.VITE_API_URL || 'https://be-sonic.vercel.app' }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe-dist
          path: dist
          retention-days: 7
