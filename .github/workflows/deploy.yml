name: Deploy

# Primary CD: link GitHub repo in Vercel Dashboard → auto deploy on push.
# This workflow is optional (manual) when you prefer CLI deploy from Actions.
on:
  workflow_dispatch:

concurrency:
  group: fe-deploy-prod
  cancel-in-progress: false

jobs:
  ci:
    name: Gate (typecheck + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL != '' && vars.VITE_API_URL || 'https://be-sonic.vercel.app' }}

  deploy:
    name: Deploy to Vercel (production)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL != '' && vars.VITE_API_URL || 'https://be-sonic.vercel.app' }}

      - name: Deploy prebuilt
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
